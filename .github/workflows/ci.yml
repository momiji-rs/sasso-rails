name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Ruby 3.1 is dropped from CI: the latest Rails 7.2 dep tree resolves to
        # nokogiri >= 1.19 (via railties -> actionpack), which requires Ruby >=
        # 3.2, so `bundle install` against current deps no longer resolves on 3.1.
        # The gem itself still works on 3.1 with a 3.1-compatible dep set (older
        # Rails / nokogiri < 1.19); see required_ruby_version in the gemspec.
        ruby: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true   # bundle install (pulls railties + precompiled sasso) + cache
      - run: bundle exec rake
